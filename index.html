<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitHub Profile Rater</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#07111f;--card:rgba(255,255,255,.06);--text:#f5f7fb;--muted:#9db0cb;--line:rgba(255,255,255,.1);--accent:#6ea8fe;--accent2:#8b5cf6;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444}
*{box-sizing:border-box}html,body{margin:0;background:radial-gradient(circle at 15% 15%, rgba(110,168,254,.18), transparent 28%),radial-gradient(circle at 85% 10%, rgba(139,92,246,.16), transparent 24%),linear-gradient(180deg,var(--bg),#050b14 70%);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh}
.wrap{max-width:1220px;margin:0 auto;padding:28px 18px 80px}.panel,.card{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:22px}.panel{margin-top:24px}.search{padding:18px;display:grid;grid-template-columns:minmax(0,1fr) auto auto auto;gap:12px}input,button{border:none;border-radius:16px;padding:14px 16px;font-size:16px}input{background:#0d1727;color:#fff}button{cursor:pointer;font-weight:700}.primary{background:linear-gradient(135deg,#6ea8fe,#8b5cf6);color:#fff}.ghost{background:#121d30;color:#dce7fb}.hidden{display:none!important}.loading{padding:18px;color:#9db0cb}.grid{display:grid;gap:16px}.top-grid{grid-template-columns:1.3fr .9fr}.card{padding:18px}.topcard{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center}.avatar{width:96px;height:96px;border-radius:24px;object-fit:cover}.username{font-size:32px;font-weight:900}.pill{display:inline-flex;background:rgba(255,255,255,.07);padding:8px 12px;border-radius:999px;border:1px solid var(--line);font-size:14px}.scoreOrb{width:148px;height:148px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(from 180deg,#6ea8fe,#8b5cf6,#22c55e,#6ea8fe);padding:2px}.scoreInner{width:100%;height:100%;border-radius:50%;background:#08111f;display:grid;place-items:center}.scoreNum{font-size:42px;font-weight:900}.quick{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.kpi{padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;min-width:110px}.kpi b{display:block;font-size:18px}.scores{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.scoreCard{padding:16px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid var(--line)}.bar{height:10px;background:#0b1524;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#6ea8fe,#8b5cf6)}.two-col,.repos{display:grid;grid-template-columns:1fr 1fr;gap:16px}ul.clean{list-style:none;padding:0;margin:0;display:grid;gap:10px}ul.clean li,.repo{padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px}.tag{padding:6px 10px;border-radius:999px;background:#101b2c;border:1px solid var(--line);font-size:12px}.leaderboard table{width:100%;border-collapse:collapse}.leaderboard th,.leaderboard td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left}.leaderboard img{width:34px;height:34px;border-radius:10px;vertical-align:middle;margin-right:10px}.tiny,.muted{color:var(--muted)}@media(max-width:980px){.top-grid,.two-col,.scores,.repos{grid-template-columns:1fr}.search{grid-template-columns:1fr 1fr}.topcard{grid-template-columns:1fr}}@media(max-width:680px){.search{grid-template-columns:1fr}.username{font-size:26px}}
</style></head><body>
<div class="wrap">
<h1>GitHub Profile Rater</h1>
<div class="muted">Analyze a public GitHub profile, score it across profile quality, repos, activity, presentation, stack, and builder energy, then get a detailed AI review.</div>
<div class="panel"><div class="search">
<input id="username" placeholder="GitHub username (e.g. torvalds)"/>
<button class="primary" id="rateBtn">Rate Profile</button>
<button class="ghost" id="leaderboardBtn">Leaderboard</button>
<button class="ghost" id="sampleBtn">Try Sample</button>
</div><div class="loading hidden" id="loading">Pulling profile, repos, README signals, activity, then asking AI to do the deep review…</div></div>
<div id="results" class="grid hidden" style="margin-top:18px"></div>
<div id="leaderboard" class="panel hidden" style="margin-top:18px;padding:18px"></div>
</div>
<script>
const SUPABASE_URL="https://tvxugmumfvgnvjacwwfz.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2eHVnbXVtZnZnbnZqYWN3d2Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NjQ1MzEsImV4cCI6MjA5NjM0MDUzMX0.76wR9dblt8W9u-OioqQH7NOethNq1BMfjTDl9xcpYYI";
const EDGE_URL=`${SUPABASE_URL}/functions/v1/profile-rater-ai`;
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=s=>document.querySelector(s), resultsEl=$("#results"), leaderboardEl=$("#leaderboard"), loadingEl=$("#loading");
const clamp=(n,min,max)=>Math.max(min,Math.min(max,n)); const sum=a=>a.reduce((x,y)=>x+y,0);
const esc=s=>String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]||m));
const daysSince=d=>!d?99999:(Date.now()-new Date(d).getTime())/86400000;
const tierFromScore=s=>s>=90?"S":s>=80?"A":s>=70?"B":s>=60?"C":"D";
function toast(m){alert(m)}
async function ghJson(url){const r=await fetch(url,{headers:{"Accept":"application/vnd.github+json"}}); if(!r.ok) throw new Error(`GitHub request failed (${r.status})`); return r.json()}
async function fetchUser(u){return ghJson(`https://api.github.com/users/${encodeURIComponent(u)}`)}
async function fetchRepos(u){let p=1,out=[];while(p<=4){const b=await ghJson(`https://api.github.com/users/${encodeURIComponent(u)}/repos?per_page=100&page=${p}&sort=updated`);out.push(...b);if(b.length<100)break;p++}return out.filter(r=>!r.fork)}
async function fetchReadmeExists(owner,repo){const r=await fetch(`https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/readme`,{headers:{"Accept":"application/vnd.github+json"}});return r.ok}
async function computeMetrics(user,repos){
 const topRepos=[...repos].sort((a,b)=>(b.stargazers_count||0)-(a.stargazers_count||0)).slice(0,12);
 const readmeChecks=await Promise.all(topRepos.map(r=>fetchReadmeExists(user.login,r.name).catch(()=>false)));
 const languageCounts={}; repos.forEach(r=>{if(r.language) languageCounts[r.language]=(languageCounts[r.language]||0)+1});
 const topLanguages=Object.entries(languageCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
 const weird=repos.filter(r=>/(test|final|temp|asdf|copy|backup)/i.test(r.name)).length;
 const goodDesc=repos.filter(r=>(r.description||"").trim().length>=18).length;
 const home=repos.filter(r=>!!r.homepage).length, topics=repos.filter(r=>Array.isArray(r.topics)&&r.topics.length).length, license=repos.filter(r=>!!r.license).length, archived=repos.filter(r=>r.archived).length;
 const recent30=repos.filter(r=>daysSince(r.pushed_at)<=30).length, recent90=repos.filter(r=>daysSince(r.pushed_at)<=90).length, recent365=repos.filter(r=>daysSince(r.pushed_at)<=365).length;
 const starsTotal=sum(repos.map(r=>r.stargazers_count||0)); const avgStars=repos.length?starsTotal/repos.length:0; const readmeCoverage=topRepos.length?readmeChecks.filter(Boolean).length/topRepos.length:0;
 const profile=clamp((user.bio?2.4:0)+(user.blog?1.2:0)+(user.location?.length?0.8:0)+(user.company?0.8:0)+(user.twitter_username?0.6:0)+clamp(user.followers/50,0,2.2)+clamp(user.public_repos/40,0,1.4)+(user.name?0.6:0),0,10);
 const reposScore=clamp((repos.length?1.5:0)+clamp(avgStars/5,0,2.4)+(goodDesc/Math.max(1,repos.length))*2+(license/Math.max(1,repos.length))*1.2+(home/Math.max(1,repos.length))*1+(topics/Math.max(1,repos.length))*1+readmeCoverage*1.8-(archived/Math.max(1,repos.length))*0.8,0,10);
 const activity=clamp(clamp(recent30/6,0,3.6)+clamp(recent90/12,0,3)+clamp(recent365/24,0,2)+clamp((3650-daysSince(user.updated_at))/3650,0,1.4),0,10);
 const presentation=clamp((user.bio?1.4:0)+(goodDesc/Math.max(1,repos.length))*2.6+readmeCoverage*2.4+(home/Math.max(1,repos.length))*1.8+(topics/Math.max(1,repos.length))*1-(weird/Math.max(1,repos.length))*1.8,0,10);
 const stack=clamp(Math.min(topLanguages.length,5)*1.35+clamp(repos.length/20,0,1.5)+(topLanguages.length>=3?1.2:0),0,10);
 const builderEnergy=clamp(clamp(recent90/10,0,3)+clamp(repos.length/20,0,2.2)+clamp(starsTotal/50,0,1.8)+clamp((topRepos.filter(r=>(r.description||"").length>24).length)/4,0,1.5)+(topLanguages.length>=3?1.2:.4),0,10);
 const overall=Math.round(profile*1.5+reposScore*2.5+activity*2+presentation*1.5+stack*1+builderEnergy*1.5);
 return {topRepos,topLanguages,stats:{repos:repos.length,followers:user.followers||0,following:user.following||0,starsTotal,avgStars:+avgStars.toFixed(2),readmeCoverage:+readmeCoverage.toFixed(2),licenseCoverage:+(license/Math.max(1,repos.length)).toFixed(2),descriptionCoverage:+(goodDesc/Math.max(1,repos.length)).toFixed(2),homepageCoverage:+(home/Math.max(1,repos.length)).toFixed(2),topicsCoverage:+(topics/Math.max(1,repos.length)).toFixed(2),archivedCount:archived,weirdRepoNames:weird,recent30,recent90,recent365},scores:{profile:+profile.toFixed(1),repos:+reposScore.toFixed(1),activity:+activity.toFixed(1),presentation:+presentation.toFixed(1),stack:+stack.toFixed(1),builderEnergy:+builderEnergy.toFixed(1),overall}};
}
async function callAI(payload){
 const res=await fetch(EDGE_URL,{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${SUPABASE_ANON_KEY}`},body:JSON.stringify(payload)});
 if(!res.ok) throw new Error("AI request failed");
 return res.json();
}
async function saveRating(user,metrics,ai){
 await sb.from("profile_ratings").upsert({username:user.login,avatar_url:user.avatar_url,overall_score:ai.overallScore??metrics.scores.overall,tier:ai.tier??tierFromScore(metrics.scores.overall),archetype:ai.archetype??"Builder",summary:ai.summary??"",profile_score:ai.categories?.profile?.score??metrics.scores.profile,repos_score:ai.categories?.repos?.score??metrics.scores.repos,activity_score:ai.categories?.activity?.score??metrics.scores.activity,presentation_score:ai.categories?.presentation?.score??metrics.scores.presentation,stack_score:ai.categories?.stack?.score??metrics.scores.stack,builder_energy_score:ai.categories?.builderEnergy?.score??metrics.scores.builderEnergy,strengths:ai.strengths??[],weaknesses:ai.weaknesses??[],improvements:ai.improvements??[],raw_metrics:metrics,rated_at:new Date().toISOString()});
 await sb.from("rating_history").insert({username:user.login,overall_score:ai.overallScore??metrics.scores.overall,tier:ai.tier??tierFromScore(metrics.scores.overall),snapshot:{user,metrics,ai}});
}
function renderReport(user,repos,metrics,ai){
 const overall=ai.overallScore??metrics.scores.overall, tier=ai.tier??tierFromScore(overall), cat=ai.categories||{};
 const categories=[["Profile",cat.profile?.score??metrics.scores.profile,cat.profile?.explanation||"Profile completeness, bio, links, followers, and overall profile presentation."],["Repos",cat.repos?.score??metrics.scores.repos,cat.repos?.explanation||"Quality of repos, stars, descriptions, licenses, topics, and README coverage."],["Activity",cat.activity?.score??metrics.scores.activity,cat.activity?.explanation||"Recent updates, consistency, and whether the account looks active."],["Presentation",cat.presentation?.score??metrics.scores.presentation,cat.presentation?.explanation||"Naming, polish, documentation, demos, and first impression."],["Stack",cat.stack?.score??metrics.scores.stack,cat.stack?.explanation||"Language breadth, technical variety, and specialization balance."],["Builder Energy",cat.builderEnergy?.score??metrics.scores.builderEnergy,cat.builderEnergy?.explanation||"Whether the profile feels like someone who actually ships and iterates."]];
 resultsEl.innerHTML=`<div class="grid top-grid"><div class="card topcard"><img class="avatar" src="${user.avatar_url}"><div><div class="username"><a href="${user.html_url}" target="_blank">@${user.login}</a></div><div class="muted">${esc(user.name||"")}${user.name&&user.bio?" · ":""}${esc(user.bio||"No bio set")}</div><div class="quick"><div class="kpi"><span class="tiny">Followers</span><b>${user.followers}</b></div><div class="kpi"><span class="tiny">Public repos</span><b>${user.public_repos}</b></div><div class="kpi"><span class="tiny">Stars across repos</span><b>${metrics.stats.starsTotal}</b></div><div class="kpi"><span class="tiny">Recent 90d</span><b>${metrics.stats.recent90}</b></div></div><div class="pill" style="margin-top:12px">${esc(ai.archetype||"Builder")}</div><div style="margin-top:12px;line-height:1.6">${esc(ai.summary||"AI summary unavailable — using metric-based score only.")}</div></div><div class="scoreOrb"><div class="scoreInner"><div><div class="scoreNum">${overall}</div><div class="tiny">${tier}-Tier Builder</div></div></div></div></div><div class="card"><div class="grid" style="grid-template-columns:1fr 1fr"><div class="kpi"><span class="tiny">README coverage</span><b>${Math.round(metrics.stats.readmeCoverage*100)}%</b></div><div class="kpi"><span class="tiny">License coverage</span><b>${Math.round(metrics.stats.licenseCoverage*100)}%</b></div><div class="kpi"><span class="tiny">Description coverage</span><b>${Math.round(metrics.stats.descriptionCoverage*100)}%</b></div><div class="kpi"><span class="tiny">Homepage coverage</span><b>${Math.round(metrics.stats.homepageCoverage*100)}%</b></div><div class="kpi"><span class="tiny">Topics coverage</span><b>${Math.round(metrics.stats.topicsCoverage*100)}%</b></div><div class="kpi"><span class="tiny">Weird repo names</span><b>${metrics.stats.weirdRepoNames}</b></div></div></div></div>
 <div class="card"><div class="scores">${categories.map(([label,score,explanation])=>`<div class="scoreCard"><h3>${label}</h3><div class="bar"><div class="fill" style="width:${Math.max(0,Math.min(10,score))*10}%"></div></div><div style="margin-top:10px;font-weight:800">${score}/10</div><div class="muted" style="margin-top:8px;font-size:14px;line-height:1.5">${esc(explanation)}</div></div>`).join("")}</div></div>
 <div class="two-col"><div class="card"><h3>Strengths</h3><ul class="clean">${(ai.strengths||[]).length?ai.strengths.map(s=>`<li>${esc(s)}</li>`).join(""):"<li>Strong areas will show here once AI returns its analysis.</li>"}</ul></div><div class="card"><h3>Weaknesses</h3><ul class="clean">${(ai.weaknesses||[]).length?ai.weaknesses.map(s=>`<li>${esc(s)}</li>`).join(""):"<li>Weak points will show here once AI returns its analysis.</li>"}</ul></div></div>
 <div class="two-col"><div class="card"><h3>How to Improve</h3><ul class="clean">${(ai.improvements||[]).length?ai.improvements.map(s=>`<li>${esc(s)}</li>`).join(""):"<li>Add README files, improve descriptions, and keep a few flagship repos polished.</li>"}</ul></div><div class="card"><h3>Profile Breakdown</h3><ul class="clean"><li><b>Followers:</b> ${user.followers} · <b>Following:</b> ${user.following}</li><li><b>Repos analyzed:</b> ${repos.length} · <b>Archived:</b> ${metrics.stats.archivedCount}</li><li><b>Activity:</b> ${metrics.stats.recent30} repos updated in 30d · ${metrics.stats.recent90} in 90d</li><li><b>Average stars/repo:</b> ${metrics.stats.avgStars}</li></ul></div></div>
 <div class="card"><h3>Top Repositories</h3><div class="repos">${metrics.topRepos.slice(0,6).map(r=>`<div class="repo"><h4><a href="${r.html_url}" target="_blank">${esc(r.name)}</a></h4><div class="muted">${esc(r.description||"No description")}</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"><span class="tag">⭐ ${r.stargazers_count||0}</span><span class="tag">🍴 ${r.forks_count||0}</span>${r.language?`<span class="tag">${esc(r.language)}</span>`:""}${r.homepage?`<span class="tag">Demo</span>`:""}${r.license?`<span class="tag">License</span>`:""}</div></div>`).join("")}</div></div>
 <div style="display:flex;gap:12px;flex-wrap:wrap"><button class="primary" id="shareBtn">Copy share text</button><button class="ghost" id="saveBtn">Save rating to Supabase</button><button class="ghost" id="showLbBtn">Show leaderboard</button></div>`;
 document.getElementById("shareBtn").onclick=async()=>{await navigator.clipboard.writeText(`I got ${overall}/100 (${tier}-tier) on GitHub Profile Rater as ${user.login} — ${ai.archetype||"Builder"}.`);toast("Copied share text")};
 document.getElementById("saveBtn").onclick=async()=>{await saveRating(user,metrics,ai);toast("Saved rating")};
 document.getElementById("showLbBtn").onclick=loadLeaderboard;
}
async function loadLeaderboard(){
 leaderboardEl.classList.remove("hidden");
 const {data,error}=await sb.from("profile_ratings").select("username, avatar_url, overall_score, tier, archetype, rated_at").order("overall_score",{ascending:false}).limit(20);
 if(error){leaderboardEl.innerHTML=`<div class="muted">Failed to load leaderboard: ${esc(error.message)}</div>`;return;}
 leaderboardEl.innerHTML=`<div class="leaderboard"><table><thead><tr><th>#</th><th>User</th><th>Score</th><th>Tier</th><th>Archetype</th><th>Rated</th></tr></thead><tbody>${data.map((row,i)=>`<tr><td>${i+1}</td><td><img src="${esc(row.avatar_url||"")}" alt="">@${esc(row.username)}</td><td><b>${row.overall_score}</b></td><td>${esc(row.tier||"")}</td><td>${esc(row.archetype||"")}</td><td class="tiny">${new Date(row.rated_at).toLocaleString()}</td></tr>`).join("")}</tbody></table></div>`;
}
async function rateProfile(username){
 loadingEl.classList.remove("hidden"); resultsEl.classList.add("hidden"); leaderboardEl.classList.add("hidden");
 try{
  const user=await fetchUser(username), repos=await fetchRepos(username), metrics=await computeMetrics(user,repos);
  const aiPayload={username:user.login,profile:{login:user.login,name:user.name,bio:user.bio,company:user.company,blog:user.blog,location:user.location,twitter_username:user.twitter_username,followers:user.followers,following:user.following,public_repos:user.public_repos,created_at:user.created_at,updated_at:user.updated_at},metrics,repoHighlights:metrics.topRepos.map(r=>({name:r.name,description:r.description,stars:r.stargazers_count||0,forks:r.forks_count||0,language:r.language,homepage:r.homepage,archived:r.archived,pushed_at:r.pushed_at}))};
  let ai={};
  try{ai=await callAI(aiPayload)}catch{ai={overallScore:metrics.scores.overall,tier:tierFromScore(metrics.scores.overall),archetype:"Builder",summary:"AI analysis failed, so this report is currently using metric-based scoring only.",categories:{profile:{score:metrics.scores.profile,explanation:"Metric-based profile score."},repos:{score:metrics.scores.repos,explanation:"Metric-based repository quality score."},activity:{score:metrics.scores.activity,explanation:"Metric-based activity score."},presentation:{score:metrics.scores.presentation,explanation:"Metric-based presentation score."},stack:{score:metrics.scores.stack,explanation:"Metric-based stack score."},builderEnergy:{score:metrics.scores.builderEnergy,explanation:"Metric-based builder energy score."}},strengths:[],weaknesses:[],improvements:[]}}
  renderReport(user,repos,metrics,ai); resultsEl.classList.remove("hidden");
 }catch(err){resultsEl.innerHTML=`<div class="card">Failed to rate profile: ${esc(err.message)}</div>`;resultsEl.classList.remove("hidden")}
 finally{loadingEl.classList.add("hidden")}
}
document.getElementById("rateBtn").onclick=()=>{const u=document.getElementById("username").value.trim(); if(!u) return toast("Enter a GitHub username"); rateProfile(u)};
document.getElementById("leaderboardBtn").onclick=loadLeaderboard;
document.getElementById("sampleBtn").onclick=()=>{document.getElementById("username").value="torvalds"; rateProfile("torvalds")};
document.getElementById("username").addEventListener("keydown",e=>{if(e.key==="Enter") document.getElementById("rateBtn").click()});
</script></body></html>
